services:
  backend:
    build: ./backend
    container_name: scandb-api
    ports:
      - "8080:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  frontend:
    build: .
    container_name: scandb-web
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=file:./dev.db
    depends_on:
      - backend
    restart: unless-stopped
