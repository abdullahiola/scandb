<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Shield background -->
  <path d="M100 10 L180 50 L180 140 Q180 200 100 230 Q20 200 20 140 L20 50 Z" fill="#1a3a5c" stroke="#c9a84c" stroke-width="4"/>
  
  <!-- Inner shield -->
  <path d="M100 25 L165 58 L165 135 Q165 188 100 215 Q35 188 35 135 L35 58 Z" fill="#1e4470" stroke="#c9a84c" stroke-width="2"/>
  
  <!-- Horizontal divider -->
  <line x1="35" y1="110" x2="165" y2="110" stroke="#c9a84c" stroke-width="2"/>
  
  <!-- Open book (top section) -->
  <g transform="translate(100, 72)">
    <!-- Left page -->
    <path d="M-8 -20 L-35 -15 L-35 15 L-8 12 Z" fill="#f5f0e0" stroke="#c9a84c" stroke-width="1"/>
    <!-- Right page -->
    <path d="M8 -20 L35 -15 L35 15 L8 12 Z" fill="#f5f0e0" stroke="#c9a84c" stroke-width="1"/>
    <!-- Spine -->
    <path d="M-8 -20 L0 -24 L8 -20 L8 12 L0 16 L-8 12 Z" fill="#d4c494" stroke="#c9a84c" stroke-width="0.5"/>
    <!-- Lines on left page -->
    <line x1="-30" y1="-8" x2="-12" y2="-10" stroke="#8b7f5e" stroke-width="0.8"/>
    <line x1="-30" y1="-2" x2="-12" y2="-4" stroke="#8b7f5e" stroke-width="0.8"/>
    <line x1="-30" y1="4" x2="-12" y2="2" stroke="#8b7f5e" stroke-width="0.8"/>
    <!-- Lines on right page -->
    <line x1="12" y1="-10" x2="30" y2="-8" stroke="#8b7f5e" stroke-width="0.8"/>
    <line x1="12" y1="-4" x2="30" y2="-2" stroke="#8b7f5e" stroke-width="0.8"/>
    <line x1="12" y1="2" x2="30" y2="4" stroke="#8b7f5e" stroke-width="0.8"/>
  </g>
  
  <!-- Lion (bottom section, simplified) -->
  <g transform="translate(100, 155)">
    <!-- Body -->
    <ellipse cx="0" cy="5" rx="28" ry="18" fill="#c9a84c"/>
    <!-- Head -->
    <circle cx="0" cy="-18" r="14" fill="#c9a84c"/>
    <!-- Mane -->
    <circle cx="0" cy="-18" r="17" fill="none" stroke="#a88a3c" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-20" r="2" fill="#1a3a5c"/>
    <circle cx="5" cy="-20" r="2" fill="#1a3a5c"/>
    <!-- Crown on lion -->
    <path d="M-10 -33 L-8 -28 L-4 -32 L0 -27 L4 -32 L8 -28 L10 -33" fill="#c9a84c" stroke="#a88a3c" stroke-width="1"/>
  </g>
  
  <!-- Laurel branches -->
  <g opacity="0.9">
    <!-- Left branch -->
    <path d="M30 200 Q50 180 45 150" fill="none" stroke="#4a8c4a" stroke-width="2"/>
    <ellipse cx="38" cy="165" rx="8" ry="4" fill="#4a8c4a" transform="rotate(-20 38 165)"/>
    <ellipse cx="42" cy="175" rx="8" ry="4" fill="#4a8c4a" transform="rotate(-30 42 175)"/>
    <ellipse cx="35" cy="185" rx="8" ry="4" fill="#4a8c4a" transform="rotate(-15 35 185)"/>
    <ellipse cx="33" cy="195" rx="8" ry="4" fill="#4a8c4a" transform="rotate(-5 33 195)"/>
    <!-- Right branch -->
    <path d="M170 200 Q150 180 155 150" fill="none" stroke="#4a8c4a" stroke-width="2"/>
    <ellipse cx="162" cy="165" rx="8" ry="4" fill="#4a8c4a" transform="rotate(20 162 165)"/>
    <ellipse cx="158" cy="175" rx="8" ry="4" fill="#4a8c4a" transform="rotate(30 158 175)"/>
    <ellipse cx="165" cy="185" rx="8" ry="4" fill="#4a8c4a" transform="rotate(15 165 185)"/>
    <ellipse cx="167" cy="195" rx="8" ry="4" fill="#4a8c4a" transform="rotate(5 167 195)"/>
  </g>
  
  <!-- Banner text -->
  <text x="100" y="105" text-anchor="middle" fill="#c9a84c" font-family="serif" font-size="9" font-weight="bold">RECTE SAPERE</text>
  <text x="100" y="225" text-anchor="middle" fill="#c9a84c" font-family="serif" font-size="9" font-weight="bold">FONS VITAE</text>
</svg>
